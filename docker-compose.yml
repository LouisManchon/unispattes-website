services:
  # ==============================
  # Base de données MySQL
  # ==============================
  db:
    image: mysql:8.0
    container_name: unispattes_db
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Application Django
  # ==============================
  backend:
    build: ./backend
    container_name: unispattes_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

# ==============================
# Volumes
# ==============================
volumes:
  mysql_data:
  static_volume:
  media_volume:
